# Cloudflare Tunnel config for backend
# Place this at ~/.cloudflared/config.yml on your Linux machine
#
# Steps:
#   1. cloudflared tunnel login
#   2. cloudflared tunnel create claude-town
#   3. Copy the tunnel UUID into this file
#   4. Add DNS record: cloudflared tunnel route dns claude-town api.evolving-clawd-town.xyz
#   5. Copy this file to ~/.cloudflared/config.yml
#   6. cloudflared tunnel run claude-town

tunnel: <YOUR_TUNNEL_UUID>
credentials-file: /root/.cloudflared/<YOUR_TUNNEL_UUID>.json

ingress:
  - hostname: api.evolving-clawd-town.xyz
    service: http://localhost:3001
    originRequest:
      noTLSVerify: true
  - service: http_status:404
